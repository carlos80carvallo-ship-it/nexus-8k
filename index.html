<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS-8K | RESULTADOS</title>
    <style>
        :root { --c-main: #00f2ff; --c-bg: #050a15; --c-card: #0a1428; }
        body { background: var(--c-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { background: linear-gradient(135deg, #0a1428, #050a15); width: 100%; text-align: center; padding: 20px 0; border-bottom: 2px solid var(--c-main); box-shadow: 0 0 20px rgba(0,242,255,0.2); }
        h1 { margin: 0; letter-spacing: 4px; color: var(--c-main); text-shadow: 0 0 10px var(--c-main); font-size: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 500px; width: 90%; }
        .card { background: var(--c-card); border: 1px solid #1a2a4a; border-radius: 12px; padding: 15px; text-align: center; position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .card:active { transform: scale(0.95); border-color: var(--c-main); }
        .card h2 { margin: 0 0 10px; font-size: 0.8rem; color: #8a9ab5; text-transform: uppercase; }
        .val { font-size: 2.5rem; font-weight: bold; color: white; display: block; margin: 5px 0; }
        .ani { color: var(--c-main); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; flex-direction:column; padding: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #1a2a4a; background: #0a1428; color: white; font-size: 1rem; }
        button { background: var(--c-main); color: black; font-weight: bold; cursor: pointer; border: none; }
        button.sec { background: transparent; color: #8a9ab5; border: 1px solid #1a2a4a; margin-top: 20px; }
        #hist-lista { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; overflow-y: auto; max-height: 60vh; }
        .hist-card { background: #1a2a4a; padding: 10px; border-radius: 5px; text-align: center; font-size: 0.8rem; }
        footer { margin-top: auto; padding: 20px; opacity: 0.5; font-size: 0.7rem; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>NEXUS-8K</h1>
        <div style="font-size: 0.7rem; color: #8a9ab5; margin-top: 5px;">SISTEMA DE RESULTADOS EN VIVO</div>
    </header>

    <div class="grid">
        <div class="card" onclick="abrirDirecto('Lotto Activo')">
            <h2>Lotto Activo</h2>
            <span class="val" id="v-Lotto-Activo">--</span>
            <span class="ani" id="a-Lotto-Activo">ESPERANDO</span>
        </div>
        <div class="card" onclick="abrirDirecto('La Granjita')">
            <h2>La Granjita</h2>
            <span class="val" id="v-La-Granjita">--</span>
            <span class="ani" id="a-La-Granjita">ESPERANDO</span>
        </div>
        <div class="card" onclick="abrirDirecto('Guácharo Activo')">
            <h2>Guácharo Activo</h2>
            <span class="val" id="v-Guácharo-Activo">--</span>
            <span class="ani" id="a-Guácharo-Activo">ESPERANDO</span>
        </div>
        <div class="card" onclick="abrirDirecto('Lotto Rey')">
            <h2>Lotto Rey</h2>
            <span class="val" id="v-Lotto-Rey">--</span>
            <span class="ani" id="a-Lotto-Rey">ESPERANDO</span>
        </div>
    </div>

    <div id="modal-historial" class="modal">
        <h2 id="h-titulo" style="color:var(--c-main)">HISTORIAL</h2>
        <input type="hidden" id="h-lotto">
        <input type="date" id="h-fecha">
        <div id="hist-lista"></div>
        <button class="sec" onclick="cerrarModales()">CERRAR</button>
    </div>

    <div id="modal-admin" class="modal">
        <div id="login-sec" style="width: 100%; max-width: 300px;">
            <h2>ACCESO PANEL</h2>
            <input type="password" id="pass" placeholder="CONTRASEÑA">
            <button onclick="validar()">ENTRAR</button>
        </div>
        <div id="panel-sec" style="display:none; width: 100%; max-width: 300px;">
            <h2 style="color:var(--c-main)">MASTER PANEL</h2>
            <input type="date" id="p-fecha">
            <select id="p-lotto" onchange="ajustarHorasAdmin()">
                <option>Lotto Activo</option>
                <option>La Granjita</option>
                <option>Guácharo Activo</option>
                <option>Lotto Rey</option>
            </select>
            <select id="p-hora"></select>
            <input type="number" id="p-num" placeholder="NÚMERO" oninput="mostrarPreview(this.value)">
            <div id="p-animal-name" style="text-align:center; color:cyan; font-weight:bold; margin-bottom:10px;">---</div>
            <button onclick="publicar()">PUBLICAR RESULTADO</button>
            <button style="background:red; color:white;" onclick="borrar()">BORRAR DÍA</button>
        </div>
        <button class="sec" onclick="cerrarModales()">SALIR</button>
    </div>

    <footer id="firma-admin">© 2026 NEXUS-8K TECHNOLOGIES</footer>

    <script>
        // ESTOS SON LOS DOS LINKS QUE NECESITABAS
        const SB_URL = "https://hzvbfpmjxhqhprehpimy.supabase.co/rest/v1/resultados"; 
        const SB_KEY = "sb_publishable_lErJ2rvkQkXLuCebY7485Q_iIQvdrog";

        async function querySupabase(method, body = null, params = "") {
            const options = {
                method: method,
                headers: {
                    "apikey": SB_KEY,
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${SB_URL}${params}`, options);
            if (!response.ok) throw new Error("Error en Supabase");
            return await response.json();
        }

        let clickCount = 0;
        const ANIMALES = { "0":"DELFÍN","00":"BALLENA","1":"CARNERO","2":"TORO","3":"CIEMPIÉS","4":"ALACRÁN","5":"LEÓN","6":"RANA","7":"PERICO","8":"RATÓN","9":"ÁGUILA","10":"TIGRE","11":"GATO","12":"CABALLO","13":"MONO","14":"PALOMA","15":"ZORRO","16":"OSO","17":"PAVO","18":"BURRO","19":"CHIVO","20":"COCHINO","21":"GALLO","22":"CAMELLO","23":"CEBRA","24":"IGUANA","25":"GALLINA","26":"VACA","27":"PERRO","28":"ZAMURO","29":"ELEFANTE","30":"CAIMÁN","31":"LAPA","32":"ARDILLA","33":"PESCADO","34":"VENADO","35":"JIRAFA","36":"CULEBRA" };
        const HORAS_NORMAL = ["09:00 AM","10:00 AM","11:00 AM","12:00 PM","01:00 PM","03:00 PM","04:00 PM","05:00 PM","06:00 PM","07:00 PM"];
        const HORAS_REY = ["01:10 PM","04:10 PM","07:10 PM"];

        function abrirDirecto(l) { document.getElementById('h-lotto').value = l; abrirHistorial(); }
        function abrirHistorial() { document.getElementById('modal-historial').style.display = 'flex'; document.getElementById('h-fecha').value = new Date().toLocaleDateString('en-CA'); cargarHistorial(); }

        async function cargarHistorial() {
            const f = document.getElementById('h-fecha').value;
            const l = document.getElementById('h-lotto').value;
            const cont = document.getElementById('hist-lista');
            cont.innerHTML = "<p style='color:cyan;'>CARGANDO...</p>";
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${f}&lotto=eq.${l}&order=hora.asc`);
                cont.innerHTML = "";
                if (data.length > 0) {
                    data.forEach(d => {
                        cont.innerHTML += `<div class="hist-card"><small>${d.hora}</small><br><b>${d.numero}</b><br><small>${d.animal}</small></div>`;
                    });
                } else { cont.innerHTML = "<p style='grid-column:1/-1; opacity:0.4;'>SIN DATOS</p>"; }
            } catch (e) { cont.innerHTML = "ERROR"; }
        }

        document.getElementById('firma-admin').addEventListener('click', () => {
            clickCount++;
            if(clickCount >= 3) {
                document.getElementById('modal-admin').style.display = 'flex';
                clickCount = 0;
                ajustarHorasAdmin();
            }
        });

        function ajustarHorasAdmin() {
            const l = document.getElementById('p-lotto').value;
            const hSel = document.getElementById('p-hora');
            hSel.innerHTML = "";
            const lista = (l === "Lotto Rey") ? HORAS_REY : HORAS_NORMAL;
            lista.forEach(h => hSel.innerHTML += `<option value="${h}">${h}</option>`);
        }

        function mostrarPreview(val) { document.getElementById('p-animal-name').innerText = ANIMALES[val] || "---"; }

        function validar() {
            if(document.getElementById('pass').value === "45Bc*.Ks*9") {
                document.getElementById('login-sec').style.display = 'none';
                document.getElementById('panel-sec').style.display = 'block';
                document.getElementById('p-fecha').value = new Date().toLocaleDateString('en-CA');
            } else { alert("CONTRASEÑA INCORRECTA"); }
        }

        async function publicar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            const h = document.getElementById('p-hora').value;
            const n = document.getElementById('p-num').value.trim();
            if(!f || n==="") return;
            try {
                await querySupabase('POST', { fecha: f, lotto: l, hora: h, numero: n, animal: ANIMALES[n] || "ANIMAL" });
                alert("GUARDADO EXITOSAMENTE");
                actualizarTablero();
            } catch (e) { alert("ERROR AL GUARDAR"); }
        }

        async function borrar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            if(confirm("¿BORRAR TODO EL DÍA?")) {
                await querySupabase('DELETE', null, `?fecha=eq.${f}&lotto=eq.${l}`);
                actualizarTablero();
            }
        }

        async function actualizarTablero() {
            const hoy = new Date().toLocaleDateString('en-CA');
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${hoy}`);
                ["Lotto Activo", "La Granjita", "Guácharo Activo", "Lotto Rey"].forEach(l => {
                    const id = l.replace(/ /g, "-");
                    const filtrado = data.filter(d => d.lotto === l);
                    if(filtrado.length > 0) {
                        const ultimo = filtrado[filtrado.length - 1];
                        document.getElementById('v-'+id).innerText = ultimo.numero;
                        document.getElementById('a-'+id).innerText = ultimo.animal;
                    }
                });
            } catch (e) { console.log("Refrescando..."); }
        }

        function cerrarModales() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('pass').value = "";
            document.getElementById('login-sec').style.display = 'block';
            document.getElementById('panel-sec').style.display = 'none';
        }

        window.onload = () => { actualizarTablero(); setInterval(actualizarTablero, 30000); };
    </script>
</body>
</html>
