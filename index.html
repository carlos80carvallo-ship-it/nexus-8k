    <script>
        // CONFIGURACIÓN DE TU SUPABASE (NEXUSDB)
        const SB_URL = "https://hzvbfpmjxhqhprehpimy.supabase.co/rest/v1/resultados";
        const SB_KEY = "sb_publishable_lErJ2rvkQkXLuCebY7485Q_iIQvdrog"; // Tu llave pública

        // FUNCIÓN MAESTRA DE CONEXIÓN
        async function querySupabase(method, body = null, params = "") {
            const options = {
                method: method,
                headers: {
                    "apikey": SB_KEY,
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${SB_URL}${params}`, options);
            if (!response.ok) throw new Error("Error en Supabase");
            return await response.json();
        }

        let clickCount = 0;
        const ANIMALES = { "0":"DELFÍN","00":"BALLENA","1":"CARNERO","2":"TORO","3":"CIEMPIÉS","4":"ALACRÁN","5":"LEÓN","6":"RANA","7":"PERICO","8":"RATÓN","9":"ÁGUILA","10":"TIGRE","11":"GATO","12":"CABALLO","13":"MONO","14":"PALOMA","15":"ZORRO","16":"OSO","17":"PAVO","18":"BURRO","19":"CHIVO","20":"COCHINO","21":"GALLO","22":"CAMELLO","23":"CEBRA","24":"IGUANA","25":"GALLINA","26":"VACA","27":"PERRO","28":"ZAMURO","29":"ELEFANTE","30":"CAIMÁN","31":"LAPA","32":"ARDILLA","33":"PESCADO","34":"VENADO","35":"JIRAFA","36":"CULEBRA" };
        const HORAS_NORMAL = ["09:00 AM","10:00 AM","11:00 AM","12:00 PM","01:00 PM","03:00 PM","04:00 PM","05:00 PM","06:00 PM","07:00 PM"];
        const HORAS_REY = ["01:10 PM","04:10 PM","07:10 PM"];

        function abrirDirecto(l) {
            document.getElementById('h-lotto').value = l;
            abrirHistorial();
        }

        function abrirHistorial() {
            document.getElementById('modal-historial').style.display = 'flex';
            document.getElementById('h-fecha').value = new Date().toISOString().split('T')[0];
            cargarHistorial();
        }

        async function cargarHistorial() {
            const f = document.getElementById('h-fecha').value;
            const l = document.getElementById('h-lotto').value;
            const cont = document.getElementById('hist-lista');
            cont.innerHTML = "<p style='color:cyan;'>CARGANDO...</p>";
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${f}&lotto=eq.${l}&order=hora.asc`);
                cont.innerHTML = "";
                if (data.length > 0) {
                    data.forEach(d => {
                        cont.innerHTML += `<div class="hist-card"><small>${d.hora}</small><br><b>${d.numero}</b><br><small>${d.animal}</small></div>`;
                    });
                } else { cont.innerHTML = "<p style='grid-column:1/-1; opacity:0.4;'>SIN DATOS</p>"; }
            } catch (e) { cont.innerHTML = "ERROR DE CONEXIÓN"; }
        }

        document.getElementById('h-fecha').addEventListener('change', cargarHistorial);
        document.getElementById('h-lotto').addEventListener('change', cargarHistorial);

        document.getElementById('firma-admin').addEventListener('click', () => {
            clickCount++;
            if(clickCount >= 3) {
                document.getElementById('modal-admin').style.display = 'flex';
                clickCount = 0;
                ajustarHorasAdmin();
            }
        });

        function ajustarHorasAdmin() {
            const l = document.getElementById('p-lotto').value;
            const hSel = document.getElementById('p-hora');
            hSel.innerHTML = "";
            const lista = (l === "Lotto Rey") ? HORAS_REY : HORAS_NORMAL;
            lista.forEach(h => hSel.innerHTML += `<option value="${h}">${h}</option>`);
        }

        function mostrarPreview(val) { document.getElementById('p-animal-name').innerText = ANIMALES[val] || "---"; }

        function validar() {
            if(document.getElementById('pass').value === "45Bc*.Ks*9") {
                document.getElementById('login-sec').style.display = 'none';
                document.getElementById('panel-sec').style.display = 'block';
                document.getElementById('p-fecha').value = new Date().toISOString().split('T')[0];
            } else { alert("ERROR"); }
        }

        async function publicar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            const h = document.getElementById('p-hora').value;
            const n = document.getElementById('p-num').value.trim();
            if(!f || n==="") return;
            try {
                // AQUÍ SE ENVÍA A TU TABLA REAL
                await querySupabase('POST', { fecha: f, lotto: l, hora: h, numero: n, animal: ANIMALES[n] || "ANIMAL" });
                alert("GUARDADO EXITOSAMENTE");
                actualizarTablero();
            } catch (e) { alert("ERROR AL GUARDAR"); }
        }

        async function borrar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            if(confirm("¿BORRAR TODO EL DÍA DE ESTE SORTEO?")) {
                await querySupabase('DELETE', null, `?fecha=eq.${f}&lotto=eq.${l}`);
                actualizarTablero();
            }
        }

        async function actualizarTablero() {
            const hoy = new Date().toISOString().split('T')[0];
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${hoy}`);
                ["Lotto Activo", "La Granjita", "Guácharo Activo", "Lotto Rey"].forEach(l => {
                    const id = l.replace(/ /g, "-");
                    const filtrado = data.filter(d => d.lotto === l);
                    if(filtrado.length > 0) {
                        const ultimo = filtrado[filtrado.length - 1];
                        document.getElementById('v-'+id).innerText = ultimo.numero;
                        document.getElementById('a-'+id).innerText = ultimo.animal;
                    }
                });
            } catch (e) { console.log("Cargando..."); }
        }

        function cerrarModales() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            document.getElementById('pass').value = "";
            document.getElementById('login-sec').style.display = 'block';
            document.getElementById('panel-sec').style.display = 'none';
        }

        window.onload = () => { actualizarTablero(); setInterval(actualizarTablero, 30000); };
                    </script>
