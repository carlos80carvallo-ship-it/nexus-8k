<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS 8K - ELITE HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue: #00f3ff; --neon-pink: #ff00c1; --glass: rgba(255, 255, 255, 0.08); --whatsapp: #25D366; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .en-vivo { color: #ff4d4d; font-weight: bold; font-size: 0.9rem; margin-top: 20px; letter-spacing: 3px; animation: blink 1.2s infinite; font-family: 'Orbitron'; }
        @keyframes blink { 0%, 100% { opacity: 1; text-shadow: 0 0 10px #ff4d4d; } 50% { opacity: 0.2; } }
        .logo-container h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; background: linear-gradient(to bottom, #fff 20%, var(--neon-blue) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; line-height: 0.9; margin-top: 10px; }
        .digital-clock { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--neon-blue); text-align: center; margin: 10px 0; text-shadow: 0 0 15px rgba(0, 243, 255, 0.5); min-height: 2.5rem; }
        .main-grid { width: 92%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; margin-top: 5px; }
        .lotto-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 22px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--neon-blue); cursor: pointer; transition: 0.3s; }
        .num-val { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; display: block; text-align: right; }
        .anim-val { font-size: 0.85rem; color: var(--neon-blue); font-weight: bold; text-transform: uppercase; text-align: right; display: block; }
        .action-btn { width: 92%; max-width: 450px; background: linear-gradient(90deg, #1e293b, #0f172a); border: 1px solid var(--neon-blue); padding: 18px; border-radius: 20px; color: var(--neon-blue); font-weight: 900; font-family: 'Orbitron'; margin-top: 15px; cursor: pointer; outline: none; }
        .whatsapp-share { width: 92%; max-width: 450px; background: var(--whatsapp); color: #fff; border: none; padding: 16px; border-radius: 20px; font-weight: 900; font-family: 'Orbitron'; margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); transition: 0.3s; }
        .disclaimer-box { width: 88%; max-width: 400px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid #1e293b; margin-top: 25px; text-align: center; }
        .disclaimer-title { color: #94a3b8; font-size: 0.7rem; font-weight: 900; font-family: 'Orbitron'; margin-bottom: 5px; display: block; }
        .disclaimer-text { color: #64748b; font-size: 0.65rem; line-height: 1.4; }
        .firma { color: var(--neon-blue); font-size: 0.75rem; letter-spacing: 4px; font-weight: 900; margin-top: 15px; padding-bottom: 40px; cursor: pointer; font-family: 'Orbitron'; opacity: 0.7; user-select: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; backdrop-filter: blur(25px); justify-content: center; align-items: center; }
        .modal-content { width: 92%; max-width: 400px; background: #0b1120; border-radius: 30px; padding: 25px; border: 1px solid var(--neon-blue); text-align: center; max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid #334155; color: white; font-family: 'Rajdhani'; font-size: 1.1rem; outline: none; }
        .preview-animal { font-family: 'Orbitron'; color: var(--neon-pink); font-size: 1.2rem; margin: 10px 0; min-height: 1.5rem; text-shadow: 0 0 10px var(--neon-pink); }
        .btn-panel { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 8px; font-family: 'Orbitron'; }
        .hist-lista { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .hist-card { background: rgba(255,255,255,0.04); padding: 10px; border-radius: 12px; border-bottom: 2px solid var(--neon-blue); text-align: center; }
    </style>
</head>
<body>

    <div class="en-vivo">● NEXUS 8K LIVE</div>
    <div class="logo-container"><h1>NEXUS<br>ANIMAL</h1></div>
    <div id="reloj" class="digital-clock">00:00:00</div>

    <div class="main-grid">
        <div class="lotto-card" style="border-left-color: #6366f1;" onclick="abrirDirecto('Lotto Activo')">
            <div>Lotto Activo</div>
            <div><span class="num-val" id="v-Lotto-Activo">--</span><span class="anim-val" id="a-Lotto-Activo">ESPERANDO</span></div>
        </div>
        <div class="lotto-card" style="border-left-color: #00ff88;" onclick="abrirDirecto('La Granjita')">
            <div>La Granjita</div>
            <div><span class="num-val" id="v-La-Granjita">--</span><span class="anim-val" id="a-La-Granjita">ESPERANDO</span></div>
        </div>
        <div class="lotto-card" style="border-left-color: var(--neon-pink);" onclick="abrirDirecto('Guácharo Activo')">
            <div>Guácharo Activo</div>
            <div><span class="num-val" id="v-Guácharo-Activo">--</span><span class="anim-val" id="a-Guácharo-Activo">ESPERANDO</span></div>
        </div>
        <div class="lotto-card" style="border-left-color: #f59e0b;" onclick="abrirDirecto('Lotto Rey')">
            <div>Lotto Rey</div>
            <div><span class="num-val" id="v-Lotto-Rey">--</span><span class="anim-val" id="a-Lotto-Rey">ESPERANDO</span></div>
        </div>
    </div>

    <button class="action-btn" onclick="abrirHistorial()">📜 CONSULTAR HISTORIAL</button>
    <button class="whatsapp-share" onclick="compartirApp()">ENVIAR A WHATSAPP</button>

    <div class="disclaimer-box">
        <span class="disclaimer-title">AVISO DE INFORMACIÓN</span>
        <p class="disclaimer-text">NEXUS ANIMAL ES UN CENTRO DIGITAL DE RESULTADOS. CARÁCTER <b>ESTRICTAMENTE INFORMATIVO</b>.</p>
    </div>
    
    <div class="firma" id="firma-admin">CARLOSC-8K</div>

    <div id="modal-historial" class="modal"><div class="modal-content">
        <h2 style="color:var(--neon-blue); font-family:'Orbitron';">HISTORIAL</h2>
        <input type="date" id="h-fecha">
        <select id="h-lotto"><option>Lotto Activo</option><option>La Granjita</option><option>Guácharo Activo</option><option>Lotto Rey</option></select>
        <div id="hist-lista" class="hist-lista"></div>
        <button class="btn-panel" style="background:var(--neon-blue); color:black; margin-top:20px;" onclick="cerrarModales()">CERRAR</button>
    </div></div>

    <div id="modal-admin" class="modal"><div class="modal-content">
        <h2 style="color:var(--neon-pink); font-family:'Orbitron';">MASTER PANEL</h2>
        <div id="login-sec"><input type="password" id="pass" placeholder="PASSWORD"><button class="btn-panel" style="background:var(--neon-pink); color:white;" onclick="validar()">ACCEDER</button></div>
        <div id="panel-sec" style="display:none;">
            <input type="date" id="p-fecha"><select id="p-lotto" onchange="ajustarHorasAdmin()"><option>Lotto Activo</option><option>La Granjita</option><option>Guácharo Activo</option><option>Lotto Rey</option></select>
            <select id="p-hora"></select><input type="text" id="p-num" placeholder="NÚMERO" oninput="mostrarPreview(this.value)"><div id="p-animal-name" class="preview-animal">---</div>
            <button class="btn-panel" style="background:#22c55e; color:white;" onclick="publicar()">GUARDAR RESULTADO</button>
            <button class="btn-panel" style="background:#ef4444; color:white; margin-top:15px;" onclick="borrar()">BORRAR DÍA</button>
        </div>
        <button class="btn-panel" onclick="cerrarModales()" style="background:#334155; color:white; margin-top:10px;">SALIR</button>
    </div></div>

    <script>
        // CONEXIÓN CON TU SUPABASE NEXUSDB
        const SB_URL = "https://hzvbfpmjxhqhprehpimy.supabase.co/rest/v1/resultados";
        const SB_KEY = "sb_publishable_lErJ2rvkQkXLuCebY7485Q_iIQvdrog";

        async function querySupabase(method, body = null, params = "") {
            const options = {
                method: method,
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}`, "Content-Type": "application/json", "Prefer": "return=representation" }
            };
            if (body) options.body = JSON.stringify(body);
            const response = await fetch(`${SB_URL}${params}`, options);
            return await response.json();
        }

        const ANIMALES = {"0":"DELFÍN","00":"BALLENA","1":"CARNERO","01":"CARNERO","2":"TORO","02":"TORO","3":"CIEMPIÉS","03":"CIEMPIÉS","4":"ALACRÁN","04":"ALACRÁN","5":"LEÓN","05":"LEÓN","6":"RANA","06":"RANA","7":"PERICO","07":"PERICO","8":"RATÓN","08":"RATÓN","9":"ÁGUILA","09":"ÁGUILA","10":"TIGRE","11":"GATO","12":"CABALLO","13":"MONO","14":"PALOMA","15":"ZORRO","16":"OSO","17":"PAVO","18":"BURRO","19":"CHIVO","20":"COCHINO","21":"GALLO","22":"CAMELLO","23":"CEBRA","24":"IGUANA","25":"GALLINA","26":"VACA","27":"PERRO","28":"ZAMURO","29":"ELEFANTE","30":"CAIMÁN","31":"LAPA","32":"ARDILLA","33":"PESCADO","34":"VENADO","35":"JIRAFA","36":"CULEBRA"};
        const HORAS_NORMAL = ["08:00 AM", "09:00 AM", "10:00 AM", "11:00 AM", "12:00 PM", "01:00 PM", "02:00 PM", "03:00 PM", "04:00 PM", "05:00 PM", "06:00 PM", "07:00 PM"];
        const HORAS_REY = ["08:30 AM", "09:30 AM", "10:30 AM", "11:30 AM", "12:30 PM", "01:30 PM", "02:30 PM", "03:30 PM", "04:30 PM", "05:30 PM", "06:30 PM", "07:30 PM"];

        let clickCount = 0;
        setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString('es-VE', { hour12: false }); }, 1000);

        function compartirApp() { window.open(`https://wa.me/?text=${encodeURIComponent("🚀 *NEXUS ANIMAL 8K*\nResultados en vivo: " + window.location.href)}`, '_blank'); }
        function abrirDirecto(l) { document.getElementById('h-lotto').value = l; abrirHistorial(); }
        function abrirHistorial() { document.getElementById('modal-historial').style.display = 'flex'; document.getElementById('h-fecha').value = new Date().toLocaleDateString('en-CA'); cargarHistorial(); }

        async function cargarHistorial() {
            const f = document.getElementById('h-fecha').value;
            const l = document.getElementById('h-lotto').value;
            const cont = document.getElementById('hist-lista');
            cont.innerHTML = "Cargando...";
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${f}&lotto=eq.${l}&order=hora.asc`);
                cont.innerHTML = "";
                data.forEach(d => { cont.innerHTML += `<div class="hist-card"><small>${d.hora}</small><br><b>${d.numero}</b><br><small>${d.animal}</small></div>`; });
                if(data.length === 0) cont.innerHTML = "SIN DATOS";
            } catch(e) { cont.innerHTML = "ERROR"; }
        }

        document.getElementById('h-fecha').addEventListener('change', cargarHistorial);
        document.getElementById('h-lotto').addEventListener('change', cargarHistorial);

        document.getElementById('firma-admin').addEventListener('click', () => { clickCount++; if(clickCount >= 3) { document.getElementById('modal-admin').style.display = 'flex'; clickCount = 0; ajustarHorasAdmin(); } });
        function ajustarHorasAdmin() { const l = document.getElementById('p-lotto').value; const hSel = document.getElementById('p-hora'); hSel.innerHTML = ""; const lista = (l === "Lotto Rey") ? HORAS_REY : HORAS_NORMAL; lista.forEach(h => hSel.innerHTML += `<option value="${h}">${h}</option>`); }
        function mostrarPreview(val) { document.getElementById('p-animal-name').innerText = ANIMALES[val] || "---"; }
        function validar() { if(document.getElementById('pass').value === "45Bc*.Ks*9") { document.getElementById('login-sec').style.display = 'none'; document.getElementById('panel-sec').style.display = 'block'; document.getElementById('p-fecha').value = new Date().toLocaleDateString('en-CA'); } else { alert("ERROR"); } }

        async function publicar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            const h = document.getElementById('p-hora').value;
            const n = document.getElementById('p-num').value.trim();
            if(!f || n==="") return;
            try {
                await querySupabase('POST', { fecha: f, lotto: l, hora: h, numero: n, animal: ANIMALES[n] || "ANIMAL" });
                alert("GUARDADO EXITOSAMENTE");
                actualizarTablero();
            } catch(e) { alert("ERROR"); }
        }

        async function borrar() {
            const f = document.getElementById('p-fecha').value;
            const l = document.getElementById('p-lotto').value;
            if(confirm("¿BORRAR TODO EL DÍA?")) {
                await querySupabase('DELETE', null, `?fecha=eq.${f}&lotto=eq.${l}`);
                actualizarTablero();
            }
        }

        async function actualizarTablero() {
            const hoy = new Date().toLocaleDateString('en-CA');
            try {
                const data = await querySupabase('GET', null, `?fecha=eq.${hoy}`);
                ["Lotto Activo", "La Granjita", "Guácharo Activo", "Lotto Rey"].forEach(l => {
                    const id = l.replace(/ /g, "-");
                    const filtrado = data.filter(d => d.lotto === l);
                    if(filtrado.length > 0) {
                        const ultimo = filtrado[filtrado.length - 1];
                        document.getElementById('v-'+id).innerText = ultimo.numero;
                        document.getElementById('a-'+id).innerText = ultimo.animal;
                    }
                });
            } catch(e) { console.log("Actualizando..."); }
        }

        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('pass').value = ""; document.getElementById('login-sec').style.display = 'block'; document.getElementById('panel-sec').style.display = 'none'; }
        window.onload = () => { actualizarTablero(); setInterval(actualizarTablero, 30000); };
    </script>
</body>
</html>
